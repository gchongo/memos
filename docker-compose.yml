name: memos-gchongo

services:
  memos:
    build:
      context: .
      dockerfile: scripts/Dockerfile.production
      args:
        VERSION: ${MEMOS_VERSION:-dev}
        COMMIT: ${MEMOS_COMMIT:-local}
    image: gchongo/memos:local
    restart: unless-stopped
    ports:
      - "${MEMOS_PORT:-5231}:5230"
    volumes:
      - ./data:/var/opt/memos
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      # Uncomment to use PostgreSQL or MySQL instead of SQLite:
      # MEMOS_DRIVER: postgres
      # MEMOS_DSN: postgresql://user:password@postgres:5432/memos?sslmode=disable

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        function reloadForStaleAssets() {
          var key = "memos-chunk-reload";
          var attempts = Number(sessionStorage.getItem(key) || "0");
          if (attempts >= 2) return;
          sessionStorage.setItem(key, String(attempts + 1));
          var url = new URL(window.location.href);
          url.searchParams.set("_r", String(Date.now()));
          window.location.replace(url.toString());
        }
        function watchStylesheet(link) {
          if (link.rel !== "stylesheet" || !link.href.includes("/assets/")) return;
          link.addEventListener("error", reloadForStaleAssets);
        }
        document.querySelectorAll('link[rel="stylesheet"]').forEach(watchStylesheet);
        new MutationObserver(function (mutations) {
          mutations.forEach(function (mutation) {
            mutation.addedNodes.forEach(function (node) {
              if (node.tagName === "LINK") watchStylesheet(node);
            });
          });
        }).observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/webp" href="/logo.webp" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#faf9f5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!-- memos.metadata.head -->
    <title>Memos</title>
  </head>
  <body class="text-base w-full min-h-svh">
    <div id="root" class="relative w-full min-h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- memos.metadata.body -->
  </body>
</html>

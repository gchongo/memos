# Unique project name — avoids clashing with other Memos stacks on the same host.
name: memos-gchongo

services:
  memos:
    build:
      context: .
      dockerfile: scripts/Dockerfile.production
      args:
        VERSION: ${MEMOS_VERSION:-dev}
        COMMIT: ${MEMOS_COMMIT:-local}
    image: gchongo/memos:local
    # No fixed container_name — Compose assigns memos-gchongo-memos-1 automatically.
    restart: unless-stopped
    ports:
      - "${MEMOS_PORT:-5231}:5230"
    volumes:
      - ./data:/var/opt/memos
    environment:
      TZ: ${TZ:-Asia/Shanghai}
